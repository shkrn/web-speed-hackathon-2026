<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaX</title>
    <script>
      window.__prefetchPromise = {};

      var idleCallback =
        window.requestIdleCallback ||
        function (callback) {
          return window.setTimeout(callback, 1200);
        };

      function prefetchNow(url) {
        window.__prefetchPromise[url] = fetch(url);
      }

      function prefetchWhenIdle(url) {
        idleCallback(function () {
          if (window.__prefetchPromise[url] == null) {
            window.__prefetchPromise[url] = fetch(url);
          }
        });
      }

      if (location.pathname === "/") {
        prefetchNow("/api/v1/posts?limit=12&offset=0");
      } else if (location.pathname.startsWith("/users/")) {
        var u = location.pathname.replace("/users/", "");
        prefetchNow("/api/v1/users/" + u);
        prefetchNow("/api/v1/users/" + u + "/posts?limit=12&offset=0");
      } else if (location.pathname.startsWith("/posts/")) {
        var p = location.pathname.replace("/posts/", "");
        prefetchNow("/api/v1/posts/" + p);
        prefetchWhenIdle("/api/v1/posts/" + p + "/comments?limit=12&offset=0");
      }

      prefetchWhenIdle("/api/v1/me");
    </script>
    <script src="/scripts/main.js" defer></script>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body class="bg-cax-canvas text-cax-text">
    <div id="app">Loading...</div>
  </body>
</html>
